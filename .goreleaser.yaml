# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      # CGo is required: the provider links against libxpum.so at runtime.
      # The CI runner must have xpumanager installed before GoReleaser runs
      # (see .github/workflows/release.yml – "Install xpumanager" step).
      - CGO_ENABLED=1
      - CGO_CFLAGS=-I/usr/include
      - CGO_LDFLAGS=-L/usr/lib/x86_64-linux-gnu -lxpum -Wl,-rpath,/usr/lib/x86_64-linux-gnu -Wl,--allow-shlib-undefined
      - GOAMD64=v1 # Ensure compatibility with older CPUs
    goos:
      - linux
    goarch:
      - amd64
    main: ./cmd/xe-exporter/main.go
    binary: xe-exporter

archives:
  - format: tar.gz
    # this name template makes the OS and Arch part of the archive name.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
      - grafana/*.json

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - id: xe-exporter
    package_name: xe-exporter
    vendor: "Tim"
    maintainer: "Tim <worktehlers@gmail.com>"
    description: "Intel Arc GPU Exporter for Prometheus and OpenTelemetry"
    license: "MIT"
    formats:
      - deb
    bindir: /usr/local/bin
    contents: []
