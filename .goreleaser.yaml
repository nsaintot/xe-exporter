# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
      - GOAMD64=v1 # Ensure compatibility with older CPUs (v1 is the default, but explicit is better)
    goos:
      - linux
    goarch:
      - amd64
    main: ./main.go
    binary: xe-exporter

archives:
  - format: tar.gz
    # this name template makes the OS and Arch part of the archive name.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
      - xe-exporter.service
      - grafana/*.json

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - id: xe-exporter
    package_name: xe-exporter
    vendor: "Tim"
    maintainer: "Tim <worktehlers@gmail.com>"
    description: "Intel Arc GPU Exporter for Prometheus and OpenTelemetry"
    license: "MIT"
    formats:
      - deb
    bindir: /usr/local/bin
    contents:
      - src: xe-exporter.service
        dst: /lib/systemd/system/xe-exporter.service
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh
      postremove: scripts/postremove.sh
